<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cellular Automata Music</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <h1>Cellular Automata</h1>
                <div class="controls">
                    <button id="start-btn">Start</button>
                    <button id="pause-btn" disabled>Pause</button>
                    <button id="next-btn">Next Step</button>
                    <button id="restart-btn">Restart</button>
                    <button id="test-sound-btn">Test Sound</button>
                </div>
                <span class="instruction">Draw a pattern to get started!</span>
            </div>
            <a href="#" class="blog-link">How it works (Blog Post)</a>
        </div>
    </header>

    <main>
        <div id="grid-container"></div>
        <div class="settings-overlay">
            <div class="setting-item">
                <span class="label">Step:</span>
                <span id="step-count">0</span>
            </div>
            <div class="setting-item">
                <span class="label">Speed:</span>
                <input type="range" id="speed-slider" min="100" max="2000" step="100" value="1000">
                <span id="speed-val">1.0s</span>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
